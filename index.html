<!DOCTYPE html>
<html>

<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Feane API Food</title>

  <!-- CSS -->
   <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/bootstrap.css" />
  <link rel="stylesheet" href="css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />

</head>

<body>

  <!-- HERO AREA -->
  <div class="hero_area">

    <div class="bg-box">
      <img src="images/hero-bg.jpg" alt="">
    </div>

    <!-- HEADER -->
    <header class="header_section">
      <div class="container">

        <nav class="navbar navbar-expand-lg custom_nav-container">

          <a class="navbar-brand" href="#">
            <span>
              Feane API Food
            </span>
          </a>

        </nav>

      </div>
    </header>

    <!-- HERO CONTENT -->
    <section class="slider_section">

      <div class="container">

        <div class="row">

          <div class="col-md-7 col-lg-6">

            <div class="detail-box">

              <h1>
              Modern Food API Website
            </h1>

            <p>
              Website restoran modern yang mengambil data makanan langsung dari Public API menggunakan JavaScript Fetch API.
            </p>

            <div class="btn-box">
              <a href="#menu" class="btn1">
                Explore Menu
              </a>
            </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </section>

  </div>

  <!-- FOOD SECTION -->
  <section id="menu" class="food_section layout_padding-bottom">

    <div class="container">

      <div class="heading_container heading_center">

        <h2>
          Our Menu
        </h2>
        
        <div class="search-box text-center mb-5">

        <input 
          type="text"
          id="search-input"
          placeholder="Search menu..."
          class="form-control"
          style="
            max-width: 400px;
            margin: auto;
            border-radius: 30px;
            padding: 12px 20px;
          "
        >
        </div>

      </div>

      <!-- PRODUCT GRID -->
      <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading delicious menu...</p>
      </div>

      <div class="row grid" id="product-container">

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer_section">

    <div class="container">

      <div class="footer-info">

        <p>
          REST API Project - Pemrograman Web 2
        </p>

      </div>

    </div>

  </footer>

  <!-- JS -->
  <script type="module" src="js/app.js"></script>

  <style>

  .box {
    transition: 0.3s;
  }

  .box:hover {
    transform: translateY(-10px);
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
  }

  #search-input {
    transition: 0.3s;
  }

  #search-input:focus {
    box-shadow: 0px 0px 20px rgba(255,190,51,0.7);
  }

  </style>

</body>

</html>
